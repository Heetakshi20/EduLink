<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Job Application Form</title>
  <link rel="shortcut icon" href="img/logo.png" type="image/x-icon" />
  <style>
    body {
      font-family: 'Times New Roman', Times, serif;
      background-color: #e7ecff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 120vh;
    }

    .job-form {
      background-color: #ffffff;
      padding: 50px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(142, 137, 231, 0.766);
      width: 500px;
    }

    .job-form h2 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 28px;
      color: #333333;
    }

    .job-form label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    .job-form input[type="text"],
    .job-form input[type="email"],
    .job-form input[type="tel"],
    .job-form input[type="file"],
    .job-form select {
      width: 100%;
      padding: 10px;
      margin-bottom: 20px;
      border: 1px solid #cccccc;
      border-radius: 5px;
      font-size: 16px;
    }

    .job-form button {
      width: 100%;
      padding: 12px;
      background-color: #5a67d8;
      border: none;
      border-radius: 5px;
      color: #ffffff;
      font-size: 16px;
      cursor: pointer;
    }

    .job-form button:hover {
      background-color:cyan;
      color: #333333;
    }
  </style>
</head>
<body>
  <div class="job-form">
    <h2>Job Application Form</h2>
    <form id="jobApplyForm" action="/apply-job" method="POST" enctype="multipart/form-data">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required />

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required />

        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required />
   
        <label for="cgpa">Average CGPA</label>
        <input type="text" id="cgpa" name="cgpa" placeholder="Enter your average CGPA" required />

        <label for="company">Select Company</label>
            <select id="company" name="company" required>
            <option value="">Select Company</option>
            <option value="Amazon">Amazon</option>
            <option value="Infosys">Infosys</option>
            <option value="Capgemini">Capgemini</option>
            <option value="Reliance Industries">Reliance Industries</option>
            <option value="J.P. Morgan">J.P. Morgan</option>
            <option value="Tata">Tata</option>
        </select>

        <label for="position">Position Applying For</label>
        <select id="position" name="position" required>
            <option value="">Select Position</option>
            <option value="Full Stack Developer">Full Stack Developer</option>
            <option value="Data Analyst">Data Analyst</option>
            <option value="Data Scientist">Data Scientist</option>
            <option value="Machine Learning Engineer">Machine Learning Engineer</option>
            <option value="UI/UX Designer">UI/UX Designer</option>
            <option value="DevOps Engineer">DevOps Engineer</option>
            <option value="Cybersecurity Analyst">Cybersecurity Analyst</option>
            <option value="Cloud Engineer">Cloud Engineer</option>
            <option value="Software Tester / QA">Software Tester / QA</option>
            <option value="Mobile App Developer">Mobile App Developer</option>
            <option value="Project Manager">Project Manager</option>
        </select>


        <label for="experience">Years of Experience</label>
        <select id="experience" name="experience" required>
            <option value="">Select Experience</option>
            <option value="0-1">0-1 Years</option>
            <option value="1-3">2-3 Years</option>
            <option value="5+">3+ Years</option>
        </select>

        <label for="resume">Upload Resume</label>
        <input type="file" id="resume" name="resume" accept=".pdf,.doc,.docx" required />

        <button type="submit">Submit Application</button>
    </form>
  </div>
  <script src="navigation-control.js"></script>

  
</body>
</html>
