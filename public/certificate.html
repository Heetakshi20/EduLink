<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EduLink - Certificate Upload</title>
  <link rel="shortcut icon" href="img/logo.png" type="image/x-icon">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Times New Roman', Times, serif;
      background-color: #f7fafc;
      display: flex;
    }

    .sidebar {
      width: 250px;
      background-color: #5a67d8;
      color: white;
      display: flex;
      flex-direction: column;
      padding-top: 20px;
      height: 100vh;
      position: fixed;
      left: 0;
    }

    .sidebar h2 {
      text-align: center;
      margin-bottom: 40px;
    }

    .sidebar a {
      text-decoration: none;
      color: white;
      padding: 15px;
      text-align: center;
      display: block;
      font-size: 18px;
    }

    .sidebar a:hover {
      background-color: #434190;
    }

    .main-content {
      margin-left: 250px;
      padding: 30px;
      width: calc(100% - 250px);
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .instruction {
      background-color: #c1dbffb6;
      text-align: center;
      padding: 20px;
      font-size: 25px;
      border-radius: 8px;
      font-weight: bold;
    }

    .upload-box {
      background-color: white;
      padding: 25px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(142, 137, 231, 0.766);
      text-align: center;
      max-width: 400px;
      margin: auto;
    }

    .upload-box h2 {
      margin-bottom: 15px;
      font-size: 22px;
    }

    .upload-box input[type="file"] {
      margin: 15px 0;
    }

    .upload-box button {
      background-color: #2857a7;
      color: white;
      border: none;
      padding: 10px 30px;
      font-size: 16px;
      border-radius: 4px;
      cursor: pointer;
    }

    .upload-box button:hover {
      background-color: #302188;
    }

    .certificates-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      padding: 0 30px;
    }

    .certificates-grid img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: 6px;
      border: 2px solid #ccc;
      background-color: #eee;
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>EduLink</h2>
    <a href="dashboard.html">Home</a>
    <a href="#">Certificate</a>
    <a href="courses.html">Courses</a>
    <a href="job.html">Job</a>
    <a href="internship.html">Internship</a>
    <a href="index.html">Logout</a>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <div class="instruction">
      Let your certificates speak for your accomplishments—upload now!<br>
      Upgrade yourself !!
    </div>

    <div class="upload-box">
      <h2>Upload Your Achievements</h2>
      <form id="uploadForm">
        <label for="certificate">Select Certificate:</label><br>
        <input type="file" id="certificate" accept="image/*" required><br>
        <button type="submit">Upload</button>
      </form>
    </div>

    <div class="certificates-grid" id="certGrid">
      <!-- Uploaded certificates will appear here -->
    </div>
  </div>

  <!-- Script to handle image upload -->
<script>
  const form = document.getElementById('uploadForm');
  const input = document.getElementById('certificate');
  const grid = document.getElementById('certGrid');

  // Show existing certificates on load
  window.addEventListener('DOMContentLoaded', async () => {
    const res = await fetch('/api/user-certificates');
    const data = await res.json();
    data.certificates.forEach(filename => displayCertificate(filename));
  });

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    const file = input.files[0];

    if (!file || !file.type.startsWith('image/')) {
      return alert('Please select a valid image.');
    }

    const formData = new FormData();
    formData.append('certificate', file);

    const response = await fetch('/upload-certificate', {
      method: 'POST',
      body: formData
    });

    if (response.ok) {
      const data = await response.json();
      displayCertificate(data.filename);
      input.value = '';
    } else {
      alert('Upload failed.');
    }
  });

  // Function to render uploaded certificate
  function displayCertificate(filename) {
    const container = document.createElement('div');
    container.style.position = 'relative';

    const img = document.createElement('img');
    img.src = `/uploads/${filename}`;

    const delBtn = document.createElement('button');
    delBtn.textContent = 'Delete';
    delBtn.style.position = 'absolute';
    delBtn.style.top = '5px';
    delBtn.style.right = '5px';
    delBtn.style.backgroundColor = 'red';
    delBtn.style.color = 'white';
    delBtn.style.border = 'none';
    delBtn.style.padding = '5px 10px';
    delBtn.style.cursor = 'pointer';

    delBtn.onclick = async () => {
      const confirmed = confirm('Are you sure you want to delete this certificate?');
      if (confirmed) {
        const res = await fetch(`/delete-certificate/${filename}`, {
          method: 'DELETE'
        });

        if (res.ok) {
          grid.removeChild(container);
        } else {
          alert('Failed to delete certificate.');
        }
      }
    };

    container.appendChild(img);
    container.appendChild(delBtn);
    grid.appendChild(container);
  }
</script>
<script src="navigation-control.js"></script>


</body>
</html>
