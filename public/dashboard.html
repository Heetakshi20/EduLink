        body {

        .sidebar {

        .main-content {

        .header {

        .profile img {

            justify-content: space-between;

        .card {

            box-shadow: 0 2px 8px rgba(142, 137, 231, 0.766);

            padding: 50px;

        }

        .data-section {
            display: flex;
            justify-content: space-between;
        }

            margin-bottom: 15px;

        }

        h3 {

            margin-bottom: 15px;
            color: #000000;
        }

        label {
            display: block;

            color: #1a1a1a;
            font-weight: 500;
        }

        .input-container {

            width: 100%;
            margin-bottom: 15px;
        }

        .input-container input {

            padding: 10px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
        }

        #clearBtn {

            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: #aaa;
            cursor: pointer;
            display: none;
        }

        .input-container input:focus + #clearBtn,
        .input-container input:not(:placeholder-shown) + #clearBtn {
            display: block;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;

        button:hover {

        }

        #recommendations {

        }

        }

        ul {

        }

        ul li {
            margin-bottom: 4px;

        p {

            border-radius: 10px;

        }

            margin-left: 15px;

    <script>
        // Simple script to draw attendance graph using Canvas API
        const canvas = document.getElementById('attendanceGraph');
        const ctx = canvas.getContext('2d');

        // Sample data
        const data = [70, 50, 60, 40, 80];
        const labels = ['Sat', 'Sun', 'Mon', 'Tue', 'Wed'];

        // Draw the graph
        function drawGraph() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            canvas.width = 400;
            canvas.height = 200;

            const barWidth = 60;
            const barSpacing = 40;
            const maxHeight = 150;

            for (let i = 0; i < data.length; i++) {
                const barHeight = (data[i] / 100) * maxHeight;
                ctx.fillStyle = '#5a67d8';
                ctx.fillRect(i * (barWidth + barSpacing), maxHeight - barHeight, barWidth, barHeight);
                ctx.fillStyle = '#000';
                ctx.textAlign = 'center';
                ctx.fillText(labels[i], i * (barWidth + barSpacing) + barWidth / 2, maxHeight + 20);
            }
        }

        drawGraph();

        // Script to handle the circular progress bars
        document.querySelectorAll('.progress-circle').forEach(circle => {
            const percentage = parseInt(circle.getAttribute('data-percentage'), 10);
            const angle = (percentage / 100) * 360;

            if (percentage > 50) {
                circle.querySelector('.left-half').style.transform = `rotate(180deg)`;
                circle.querySelector('.right-half').style.transform = `rotate(${angle - 180}deg)`;
            } else {
                circle.querySelector('.right-half').style.transform = `rotate(${angle}deg)`;
            }
        });

            fetch('/api/username')
        .then(res => res.json())
        .then(data => {
            document.getElementById('username').innerText = `Hi, ${data.name}`;
        });

        document.getElementById("clearBtn").addEventListener("click", () => {

        document.addEventListener("DOMContentLoaded", () => {
        fetch('/api/updates')
        .then(res => res.json())
        .then(data => {
            const container = document.getElementById('activity-container');

            if (data.length === 0) {
            container.innerHTML = "<p>No upcoming activities yet.</p>";
            return;
            }

            // Limit to max 4 updates (since you have 4 slots)
            data.slice(0, 4).forEach(update => {
            const item = document.createElement('div');
            item.className = "activity-item";
            item.innerHTML = `
                <div class="date-box"></div>
                <div class="details">

            container.appendChild(item);
            });
        })

            console.error("Failed to fetch updates:", err);
