<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Times New Roman', Times, serif;
    }

    body{
        display: flex;
        height: 100vh;
        background-color: #fff1f1;
        color: black;
    }

    .container {
        display: flex;
        width: 100%;
    }

    .sidebar {
        width: 250px;
        height: 800px;
        background-color: #f1163a;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 20px;
    }

    .sidebar h2 {
        margin-bottom: 40px;
    }

    .sidebar a {
        text-decoration: none;
        color: white;
        padding: 15px 0;
        width: 100%;
        text-align: center;
        font-size: 18px;
    }

    .sidebar a:hover {
        background-color: #ee6464;
    }

    .main-content {
        flex: 1;
        padding: 20px;
    }

    .submenu {
        padding-left: 20px;
    }

    main {
        flex: 1;
        background-color: #fff1f1;
        padding: 20px;
    }

    .navbar {
        display: flex;
        justify-content:end;
        align-items: center;
        margin-bottom: 20px;
    }

    /* .navbar .icons {
        display:flex;
        gap: 20px;
        color: #2a3a4c;
    } */

    .cards {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
    }

    .card {
        flex: 1;
        background-color: #f8a4a4;
        padding: 20px;
        border-radius: 10px;
        text-align: center;
    }

    .card h3 {
        font-size: 18px;
        margin-bottom: 10px;
    }

    .card p {
        font-size: 24px;
        margin-bottom: 10px;
    }

    .positive {
        color: #4caf50;
    }

    .negative {
        color: #f44336;
    }

    .table-section {
        background-color:#f8a4a4;
        border-radius: 10px;
        padding: 20px;
    }

    .create-invoice {
        background-color: #5b78ff;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin-bottom: 20px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    table th, table td {
        padding: 15px;
        text-align: left;
    }

    table thead {
        background-color:#f8a4a4;
    }

    table tbody tr {
        border-bottom: 1px solid #000000;
    }

</style>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>EduLink</h2>
            <a href="admin.html">Home</a>
            <a href="ajob.html">Job</a>
            <a href="#">Internship</a>
            <a href="index.html">Logout</a>
        </div>
        <!-- Main Content -->
        <main>
            <header class="navbar">
                
            </header>

            <!-- Cards Section -->
            <section class="cards">
                <div class="card">
                    <h3>Students</h3>
                    <p>3,156</p>
                   
                </div>
                <div class="card">
                    <h3>Inhouse Internship</h3>
                    <p>10</p>
                    
                </div>
                <div class="card">
                    <h3>Other Internship</h3>
                    <p>15</p>
                
                </div>
                <div class="card">
                    <h3>Task</h3>
                    <p>30+</p>
                    
                </div>
            </section>

            <!-- Table Section -->
            <section class="table-section">
                <table>
                    <thead>
                        <tr>
                            <th>Student Name</th>
                            <th>Email ID</th>
                            <th>Branch</th>
                            <th>Divison</th>
                            <th>Roll no</th>
                            <th>Internship</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <th></th>
                        </tr>
                        <tr>
                            <td></td>
                            <td></td>
                            <th></th>
                            <td></td>
                            <td></td>
                            <td></td>
                        </tr>
                        <tr>
                            <td></td>
                            <th></th>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                        </tr>
                        
                    </tbody>
                </table>
            </section>
        </main>
    </div>
    <script>
    // Fetch data from backend
    fetch('/api/intern-applications')
        .then(res => res.json())
        .then(data => {
        const tbody = document.querySelector('tbody');
        tbody.innerHTML = '';

        data.forEach(item => {
            const row = document.createElement('tr');
            row.innerHTML = `
            <td>${item.name}</td>
            <td>${item.email}</td>
            <td>${item.branch}</td>
            <td>${item.division}</td>
            <td>${item.rollno}</td>
            <td>${item.internship}</td>
            `;
            tbody.appendChild(row);
        });
        })
        .catch(err => {
        console.error('Error fetching intern data:', err);
        });
    </script>
    <script src="navigation-control.js"></script>


</body>
</html>
